<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>Demo Vue.js Project | Modern Vue 3 Application</title>
    <meta
      name="description"
      content="A production-ready Vue 3 application built with Vite, TypeScript, ESLint, and modern best practices."
    />
    <meta
      name="keywords"
      content="Vue 3, Vite, TypeScript, frontend, modern web app"
    />
    <meta
      name="author"
      content="Dileep Kushwaha"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/vite.svg"
    />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta
      property="og:type"
      content="website"
    />
    <meta
      property="og:title"
      content="Demo Vue.js Project"
    />
    <meta
      property="og:description"
      content="Production-ready Vue 3 application using modern best practices."
    />
    <meta
      property="og:image"
      content="/og-image.png"
    />
    <meta
      property="og:url"
      content="https://example.com"
    />

    <!-- Twitter Card -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />
    <meta
      name="twitter:title"
      content="Demo Vue.js Project"
    />
    <meta
      name="twitter:description"
      content="Modern Vue 3 app built with Vite and TypeScript."
    />
    <meta
      name="twitter:image"
      content="/og-image.png"
    />

    <!-- Performance -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#42b883"
    />
  </head>

  <body>
    <noscript>
      <strong>This application requires JavaScript to run. Please enable JavaScript.</strong>
    </noscript>

    <div
      id="app"
      role="main"
      aria-label="Vue application root"
    ></div>

    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
